<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ボツリヌス菌クリックゲーム</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at center, #ffe48a, #e09b00);
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 15px 25px;
    text-align: center;
  }

  #title { font-size: 26px; font-weight: bold; }
  #score { font-size: 18px; }
  #timer {
    font-size: 22px;
    font-weight: bold;
  }

  #startBtn {
    margin-top: 10px;
    padding: 8px 20px;
    font-size: 16px;
    border-radius: 999px;
    border: none;
    background: #ffcc00;
    cursor: pointer;
  }

  #game {
    width: 100vw;
    height: 100vh;
    cursor: pointer;
  }

  .bacteria {
    position: absolute;
    width: 32px;
    height: 10px;
    background: linear-gradient(90deg, #fff, #e0e0e0);
    border-radius: 50%;
    animation: wiggle 1.2s infinite ease-in-out;
  }

  @keyframes wiggle {
    0% { transform: rotate(0deg) scale(1,1); }
    50% { transform: rotate(12deg) scale(1.1,0.9); }
    100% { transform: rotate(0deg) scale(1,1); }
  }

  #result {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 32px;
    display: none;
    font-weight: bold;
  }
</style>

</head>
<body>

<div id="ui">
  <div id="title">ボツリヌス菌がいるよ！　とにかくクリックしてみよう！</div>
  <div id="score">菌数：1</div>
  <div id="timer">残り：10.0秒</div>
  <button id="startBtn">スタート</button>
</div>

<div id="game"></div>
<div id="result"></div>

<script>
const game = document.getElementById("game");
const scoreText = document.getElementById("score");
const timerText = document.getElementById("timer");
const result = document.getElementById("result");
const startBtn = document.getElementById("startBtn");
const title = document.getElementById("title");

let count = 1n;
let startTime = 0;
let duration = 10000;
let playing = false;

const MAX_RENDER = 2000;

/* 描画 */
function render() {
  game.innerHTML = "";
  let renderCount = Number(count > BigInt(MAX_RENDER) ? MAX_RENDER : count);

  for (let i = 0; i < renderCount; i++) {
    const b = document.createElement("div");
    b.className = "bacteria";
    b.style.left = Math.random() * window.innerWidth + "px";
    b.style.top = Math.random() * window.innerHeight + "px";
    b.style.animationDelay = Math.random() + "s";
    game.appendChild(b);
  }

  scoreText.textContent = "菌数：" + count.toString();
}

/* クリック */
game.addEventListener("click", () => {
  if (!playing) return;
  count *= 2n;
  render();
});

/* スタート */
startBtn.onclick = () => {
  count = 1n;
  startTime = Date.now();
  playing = true;

  result.style.display = "none";

  // UI簡略化（タイマーだけ残す）
  startBtn.style.display = "none";
  scoreText.style.display = "none";
  title.style.display = "none";

  render();
  loop();
};

/* ループ */
function loop() {
  if (!playing) return;

  let elapsed = Date.now() - startTime;
  let remain = Math.max(0, duration - elapsed);

  timerText.textContent = "残り：" + (remain / 1000).toFixed(1) + "秒";

  if (remain <= 0) {
    endGame();
  } else {
    requestAnimationFrame(loop);
  }
}

/* 終了 */
function endGame() {
  playing = false;

  result.style.display = "block";
  result.innerHTML = `
    終了！<br>
    ボツリヌス菌数：${count.toString()}匹<br><br>
    食の安全に気を付けましょう
  `;

  // UIを元に戻す
  startBtn.style.display = "inline-block";
  scoreText.style.display = "block";
  title.style.display = "block";
}
</script>

</body>
</html>
